<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMBMS | Check Status</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body"> <header class="navbar" style="position: absolute; top: 0; width: 100%;">
        <div class="logo">HMBMS</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="request-milk.html">Request Milk</a></li>
                <li><a href="donate-milk.html">Donate Milk</a></li>
            </ul>
        </nav>
    </header>

    <div class="login-container" style="margin-top: 60px;">
        <div class="login-header">
            <h2>Check Request Status</h2>
            <p>Enter your Inquiry Ticket Number and registered Contact Number to view real-time updates.</p>
        </div>
        
        <form class="login-form" action="/api/check-status" method="GET">
            <div class="form-group">
                <label for="ticket_id">Inquiry Ticket Number</label>
                <input type="text" id="ticket_id" name="ticket_id" required placeholder="e.g., INQ-10294">
            </div>
            
            <div class="form-group">
                <label for="phone">Registered Contact Number</label>
                <input type="tel" id="phone" name="phone" required placeholder="e.g., 09123456789">
            </div>

            <button type="submit" class="btn-primary btn-full">Check Status</button>
        </form>
        
        <div id="status-result" style="display: none; margin-top: 2rem; padding: 1rem; border-radius: 6px; background-color: #F0FDF4; border: 1px solid #BBF7D0; text-align: center;">
            <h3 style="color: #166534; font-size: 1.1rem; margin-bottom: 0.5rem;">Status: Ready for Dispensing</h3>
            <p style="color: #15803D; font-size: 0.9rem;">Your requested milk (Batch #8492) has passed lab testing and is ready for pickup at Makati Milk Bank.</p>
        </div>
    </div>
</body>
</html>
