<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMBMS | Donate Milk</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">HMBMS</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="request-milk.html">Request Milk</a></li>
                <li><a href="status-check.html">Check Request Status</a></li>
            </ul>
        </nav>
    </header>

    <section class="form-section">
        <div class="form-container">
            <h2>Become a Mother-Donor</h2>
            <p class="form-subtitle">Your donation can save lives. Please complete this preliminary screening form. A temporary Application ID will be generated for your hospital lab screening.</p>
            
            <form action="/submit-donor-profile" method="POST" class="standard-form">
                
                <fieldset>
                    <legend>Personal Details</legend>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="first_name">First Name</label>
                            <input type="text" id="first_name" name="first_name" required>
                        </div>
                        <div class="form-group">
                            <label for="last_name">Last Name</label>
                            <input type="text" id="last_name" name="last_name" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="contact_number">Contact Number (For SMS Alerts)</label>
                            <input type="tel" id="contact_number" name="contact_number" placeholder="e.g., 09123456789" required>
                        </div>
                        <div class="form-group">
                            <label for="infant_age">Age of your infant (Months)</label>
                            <input type="number" id="infant_age" name="infant_age" min="0" required>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Health Screening Summary</legend>
                    
                    <div class="form-group full-width">
                        <label for="health_profile_summary">Medical History & Current Medications</label>
                        <textarea id="health_profile_summary" name="health_profile_summary" rows="4" placeholder="Please list any ongoing medical conditions, recent illnesses, or medications you are currently taking..." required></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="screening_consent" name="screening_consent" required>
                        <label for="screening_consent">I consent to a physical laboratory screening at the milk bank facility to finalize my donor registration.</label>
                    </div>
                </fieldset>

                <button type="submit" class="btn-primary btn-full">Submit Application</button>
            </form>
        </div>
    </section>
</body>
</html>
